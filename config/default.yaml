app:
  default_symbols:
    - NVDA
    - META
    - PLTR
    - CRWD
    - ANET
    - DUOL
    - APP
    - SNOW
  benchmark_symbol: SPY
  vix_symbol: ^VIX
  price_period: 18mo
  cache_dir: data_cache
  snapshot_dir: data_runs
  use_sample_data_if_fetch_fails: false
  refresh_on_start: true

data:
  technical_cache_ttl_hours: 12
  profile_cache_ttl_hours: 168
  fundamental_cache_ttl_hours: 24
  allow_stale_cache_on_failure: true
  persist_research_snapshots: true

universe:
  min_market_cap: 1000000000
  min_avg_volume_50d: 1000000
  min_price: 10.0
  min_adr_percent: 3.5
  max_adr_percent: 10.0
  excluded_sectors:
    - Healthcare

universe_discovery:
  enabled: true
  use_snapshot_when_no_manual_symbols: true
  snapshot_ttl_days: 7
  allowed_exchanges:
    - NASDAQ
    - NYSE
  page_size: 250
  max_pages_per_exchange: 1
  max_symbols: 60
  min_market_cap: 1000000000
  min_avgdailyvol3m: 1000000
  min_price: 10.0
  sort_field: intradaymarketcap
  sort_ascending: false

indicators:
  ema_period: 21
  sma_short_period: 50
  sma_long_period: 200
  atr_period: 14
  adr_period: 20
  adr_formula: hl_pct
  dcr_formula: closing_range
  relvol_period: 50
  weekly_short_wma_period: 10
  weekly_long_wma_period: 30
  three_weeks_tight_threshold_pct: 1.5
  enable_3wt: true
  atr_21ema_good_min: -0.5
  atr_21ema_good_max: 1.0
  atr_50sma_good_max: 3.0
  ema21_low_pct_full_max: 5.0
  ema21_low_pct_reduce_max: 8.0
  atr_pct_from_50sma_overheat: 7.0
  show_overheat_dot: true
  pp_count_window_days: 30
  pocket_pivot_lookback: 10

scoring:
  rs:
    benchmark_symbol: SPY
    rs_lookbacks: [5, 21, 63, 126]
    rs_normalization_method: percentile
    rs_strong_threshold: 80
    rs_weak_threshold: 39
  fundamental:
    eps_weight: 1.0
    revenue_weight: 1.0
    fundamental_normalization_method: percentile
    missing_fundamental_policy: fill_neutral
  industry:
    industry_aggregation_method: mean
    industry_rs_input_metric: weighted_rs
    industry_score_normalization_method: percentile
  hybrid:
    rs_weights: [1.0, 2.0, 2.0]
    fundamental_weight: 2.0
    industry_weight: 3.0
    hybrid_missing_value_policy: fill_neutral_50
  vcs:
    vcs_threshold_candidate: 60.0
    vcs_threshold_priority: 80.0
    len_short: 13
    len_long: 63
    len_volume: 50
    sensitivity: 2.0
    trend_penalty_weight: 1.0
    bonus_max: 15.0

scan:
  daily_gain_bullish_threshold: 4.0
  relative_volume_bullish_threshold: 1.0
  relative_volume_vol_up_threshold: 1.5
  momentum_97_weekly_rank: 97.0
  momentum_97_quarterly_rank: 85.0
  club_97_hybrid_threshold: 90.0
  club_97_rs21_threshold: 97.0
  vcs_min_threshold: 60.0
  weekly_gainer_threshold: 20.0
  duplicate_min_count: 3
  high_eps_growth_rank_threshold: 90.0
  earnings_warning_days: 7
  watchlist_sort_mode: hybrid_score

market:
  component_weights:
    pct_above_ema21: 0.20
    pct_above_sma50: 0.25
    pct_above_sma200: 0.20
    pct_sma50_gt_sma200: 0.20
    vix_score: 0.15
  bullish_threshold: 80.0
  positive_threshold: 60.0
  neutral_threshold: 40.0
  negative_threshold: 20.0

radar:
  top_movers_count: 3
  overall_rs_weights: [1.0, 2.0, 2.0]
  near_high_threshold_pct: 0.5
  sector_etfs:
    - { ticker: QQQ, name: Nasdaq 100 }
    - { ticker: QQQE, name: Nasdaq 100 Equal Weight }
    - { ticker: RSP, name: S&P 500 Equal Weight }
    - { ticker: DIA, name: Dow Jones }
    - { ticker: IWM, name: Russell 2000 }
    - { ticker: XLV, name: Health Care }
    - { ticker: XLE, name: Energy }
    - { ticker: XLF, name: Financials }
    - { ticker: XLRE, name: Real Estate }
    - { ticker: XLB, name: Materials }
    - { ticker: XLP, name: Consumer Staples }
    - { ticker: XLU, name: Utilities }
    - { ticker: XLY, name: Consumer Discretionary }
    - { ticker: XLK, name: Technology }
    - { ticker: XLC, name: Communication Services }
    - { ticker: XLI, name: Industrials }
  industry_etfs:
    - { ticker: SMH, name: Semiconductors, major_stocks: [NVDA, AVGO, AMD] }
    - { ticker: IGV, name: Software, major_stocks: [MSFT, ORCL, CRM] }
    - { ticker: HACK, name: Cybersecurity, major_stocks: [CRWD, PANW, ZS] }
    - { ticker: FDN, name: Internet, major_stocks: [AMZN, META, NFLX] }
    - { ticker: XBI, name: Biotech, major_stocks: [VRTX, REGN, ARGX] }
    - { ticker: ITA, name: Aerospace and Defense, major_stocks: [GE, RTX, LMT] }

optional:
  enable_darvas_retest_filter: false
  enable_trend_regime_filter: false
