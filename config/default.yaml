app:
  default_symbols:
    - NVDA
    - META
    - PLTR
    - CRWD
    - ANET
    - DUOL
    - APP
    - SNOW
  benchmark_symbol: SPY
  vix_symbol: ^VIX
  price_period: 1y
  cache_dir: data_cache
  snapshot_dir: data_runs
  use_sample_data_if_fetch_fails: false
  refresh_on_start: true

data:
  technical_cache_ttl_hours: 12
  profile_cache_ttl_hours: 168
  fundamental_cache_ttl_hours: 24
  allow_stale_cache_on_failure: true
  persist_research_snapshots: true
  price_batch_size: 80
  price_max_retries: 3
  price_request_sleep_seconds: 2.0
  price_retry_backoff_multiplier: 2.0
  price_incremental_period: 5d

universe:
  min_market_cap: 1000000000
  min_avg_volume_50d: 1000000
  min_price: 0.0
  min_adr_percent: 3.5
  max_adr_percent: 10.0
  excluded_sectors:
    - Healthcare

universe_discovery:
  enabled: true
  provider: finviz
  use_snapshot_when_no_manual_symbols: true
  snapshot_ttl_days: 7
  allowed_exchanges:
    - NASDAQ
    - NYSE
    - AMEX
  excluded_sectors:
    - Healthcare
  max_symbols: 2500
  min_market_cap: 1000000000

indicators:
  ema_period: 21
  sma_short_period: 50
  sma_long_period: 200
  atr_period: 14
  adr_period: 20
  adr_formula: sma_high_low_ratio
  dcr_formula: closing_range
  relvol_period: 50
  rsi_short_period: 21
  rsi_long_period: 63
  weekly_short_wma_period: 10
  weekly_long_wma_period: 30
  three_weeks_tight_pct_threshold: 1.5
  enable_3wt: true
  atr_21ema_good_min: -0.5
  atr_21ema_good_max: 1.0
  atr_50sma_good_max: 3.0
  ema21_low_pct_full_max: 5.0
  ema21_low_pct_reduce_max: 8.0
  atr_pct_from_50sma_overheat: 7.0
  show_overheat_dot: true
  pp_count_window_days: 30
  pocket_pivot_lookback: 10

scoring:
  rs:
    benchmark_symbol: SPY
    rs_lookbacks: [5, 21, 63, 126]
    rs_normalization_method: percentile
    rs_strong_threshold: 80
    rs_weak_threshold: 39
  fundamental:
    eps_weight: 1.0
    revenue_weight: 1.0
    fundamental_normalization_method: percentile
    missing_fundamental_policy: fill_neutral
  industry:
    industry_aggregation_method: mean
    industry_rs_input_metric: rs21
    industry_score_normalization_method: percentile
  hybrid:
    rs_weights: [1.0, 2.0, 2.0]
    fundamental_weight: 2.0
    industry_weight: 3.0
    hybrid_missing_value_policy: fill_neutral_50
  vcs:
    vcs_threshold_candidate: 60.0
    vcs_threshold_priority: 80.0
    len_short: 13
    len_long: 63
    len_volume: 50
    hl_lookback: 63
    sensitivity: 2.0
    trend_penalty_weight: 1.0
    penalty_factor: 0.75
    bonus_max: 15.0

scan:
  daily_gain_bullish_threshold: 4.0
  relative_volume_bullish_threshold: 1.0
  relative_volume_vol_up_threshold: 1.5
  momentum_97_weekly_rank: 97.0
  momentum_97_quarterly_rank: 85.0
  club_97_hybrid_threshold: 90.0
  club_97_rs21_threshold: 97.0
  vcs_min_threshold: 60.0
  weekly_gainer_threshold: 20.0
  near_52w_high_threshold_pct: 5.0
  near_52w_high_hybrid_min: 70.0
  three_weeks_tight_vcs_min: 50.0
  rs_acceleration_rs21_min: 70.0
  duplicate_min_count: 3
  high_eps_growth_rank_threshold: 90.0
  earnings_warning_days: 7
  watchlist_sort_mode: hybrid_score
  enabled_scan_rules:
    - 21EMA scan
    - 4% bullish
    - Vol Up
    - Momentum 97
    - 97 Club
    - VCS
    - Pocket Pivot
    - PP Count
    - Weekly 20% plus gainers
    - Near 52W High
    - Three Weeks Tight
    - RS Acceleration
  enabled_annotation_filters: []
  annotation_filters:
    - filter_name: Relative Strength 21 > 63
      display_name: RSI 21 > 63
    - filter_name: High Est. EPS Growth
      display_name: High Est. EPS Growth
  card_sections:
    - scan_name: 21EMA scan
      display_name: 21EMA
    - scan_name: 4% bullish
      display_name: 4% bullish
    - scan_name: Vol Up
      display_name: Vol Up
    - scan_name: Momentum 97
      display_name: Momentum 97
    - scan_name: 97 Club
      display_name: 97 Club
    - scan_name: VCS
      display_name: VCS
    - scan_name: Pocket Pivot
      display_name: Pocket Pivot
    - scan_name: PP Count
      display_name: 3+ Pocket Pivots (30d)
    - scan_name: Weekly 20% plus gainers
      display_name: Weekly 20%+ Gainers
    - scan_name: Near 52W High
      display_name: Near 52W High
    - scan_name: Three Weeks Tight
      display_name: 3WT
    - scan_name: RS Acceleration
      display_name: RS Accel

