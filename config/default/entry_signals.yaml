entry_signals:
  context_guard:
    enabled: true
    weak_market_score_threshold: 30.0
    cap_below_signal_detected: true
    signal_overrides:
      orderly_pullback_entry:
        weak_market_score_threshold: 30.0
      pullback_resumption_entry:
        weak_market_score_threshold: 30.0
      momentum_acceleration_entry:
        weak_market_score_threshold: 40.0
      accumulation_breakout_entry:
        weak_market_score_threshold: 40.0
      early_cycle_recovery_entry:
        weak_market_score_threshold: 20.0
      power_gap_pullback_entry:
        weak_market_score_threshold: 30.0
    earnings:
      warning_field: earnings_in_7d
      today_field: earnings_today
  signal_status_map:
    orderly_pullback_entry: enabled
    pullback_resumption_entry: enabled
    momentum_acceleration_entry: enabled
    accumulation_breakout_entry: enabled
    early_cycle_recovery_entry: enabled
    power_gap_pullback_entry: enabled
  default_selected_signal_names:
  - orderly_pullback_entry
  - pullback_resumption_entry
  - momentum_acceleration_entry
  - accumulation_breakout_entry
  - early_cycle_recovery_entry
  - power_gap_pullback_entry
  definitions:
    orderly_pullback_entry:
      display_name: "Orderly Pullback Entry"
      signal_version: "1.0"
      description: >
        Captures 21EMA reclaim timing after an orderly pullback and scores setup maturity,
        timing quality, and risk/reward as continuous values.
      pool:
        preset_sources:
        - "Pullback Trigger"
        detection_window_days: 10
        invalidation:
        - field: close
          condition: below
          reference: sma50
        - field: drawdown_from_20d_high_pct
          condition: above
          threshold: 20.0
        - field: rs21
          condition: below
          threshold: 40.0
        - field: sma50_slope_10d_pct
          condition: at_or_below
          threshold: 0.0
        snapshot_fields:
        - close
        - ema21_close
        - sma50
        - rs21
        - atr
        - drawdown_from_20d_high_pct
        - volume_ma5_to_ma20_ratio
        - atr_21ema_zone
        - atr_50sma_zone
        - rolling_20d_close_high
        - high
        pool_tracking:
        - low_since_detection
        - high_since_detection
      setup_maturity:
        indicators:
          volume_exhaustion:
            weight: 0.30
            field: volume_ma5_to_ma20_ratio
            breakpoints:
            - [0.60, 100]
            - [0.70, 80]
            - [0.80, 55]
            - [0.85, 35]
            - [0.95, 10]
            - [1.00, 0]
          support_convergence:
            weight: 0.25
            field: atr_21ema_zone
            breakpoints:
            - [-1.25, 0]
            - [-0.75, 40]
            - [-0.50, 70]
            - [-0.25, 95]
            - [0.00, 100]
            - [0.25, 95]
            - [0.50, 70]
            - [1.00, 0]
          pullback_duration:
            weight: 0.20
            field: _days_since_first_detected
            breakpoints:
            - [1, 20]
            - [2, 50]
            - [3, 80]
            - [4, 100]
            - [5, 100]
            - [6, 85]
            - [7, 65]
            - [8, 45]
            - [9, 25]
            - [10, 10]
          trend_integrity:
            weight: 0.15
            components:
              ema21_slope:
                field: ema21_slope_5d_pct
                weight: 0.60
                breakpoints:
                - [-0.05, 0]
                - [0.00, 20]
                - [0.10, 50]
                - [0.20, 80]
                - [0.30, 100]
              sma50_slope:
                field: sma50_slope_10d_pct
                weight: 0.40
                breakpoints:
                - [-0.02, 0]
                - [0.00, 20]
                - [0.05, 50]
                - [0.10, 80]
                - [0.15, 100]
          rs_resilience:
            weight: 0.10
            field: _rs21_delta_from_detection
            breakpoints:
            - [-20, 0]
            - [-15, 25]
            - [-10, 50]
            - [-5, 75]
            - [0, 100]
            - [5, 100]
      timing:
        indicators:
          ema_reclaim_event:
            weight: 0.30
          volume_confirmation:
            weight: 0.25
            field: volume_ratio_20d
            breakpoints:
            - [0.60, 5]
            - [0.80, 15]
            - [1.00, 40]
            - [1.30, 70]
            - [1.50, 90]
            - [2.00, 95]
            - [2.50, 80]
            - [3.50, 50]
          close_quality:
            weight: 0.20
            field: dcr_percent
            breakpoints:
            - [20, 5]
            - [30, 10]
            - [40, 25]
            - [50, 40]
            - [60, 60]
            - [70, 80]
            - [80, 100]
          micro_structure_breakout:
            weight: 0.15
          demand_footprint:
            weight: 0.10
      risk_reward:
        stop:
          reference: low_since_detection
          atr_buffer: 0.25
          min_distance_atr: 0.75
          structural_penalty: 0.80
        reward:
          primary: snapshot_rolling_20d_close_high
          secondary: high_52w
          fallback: measured_move
        scoring:
          method: system_default
          breakpoints:
          - [0.5, 5]
          - [1.0, 25]
          - [1.5, 50]
          - [2.0, 70]
          - [2.5, 85]
          - [3.0, 95]
      entry_strength:
        weights:
          setup_maturity: 0.25
          timing: 0.40
          risk_reward: 0.35
        floor_gate:
          min_axis_threshold: 20
          capped_strength: 30
      display:
        thresholds:
          signal_detected: 50
          approaching: 35
          tracking: 0
    pullback_resumption_entry:
      display_name: "Pullback Resumption Entry"
      signal_version: "1.0"
      description: >
        Scores 21EMA, reclaim, and 50SMA defense pullback candidates with depth-aware
        stop placement and reward-to-risk gating.
      pool:
        preset_sources:
        - "Pullback Trigger"
        - "50SMA Defense"
        - "Reclaim Trigger"
        detection_window_days: 7
        invalidation:
        - field: close
          condition: below
          reference: sma50
          reference_multiplier: 0.97
        - field: drawdown_from_20d_high_pct
          condition: above
          threshold: 20.0
        - field: rs21
          condition: below
          threshold: 40.0
        snapshot_fields:
        - close
        - ema21_close
        - sma50
        - rs21
        - atr
        - drawdown_from_20d_high_pct
        - volume_ma5_to_ma20_ratio
        - atr_21ema_zone
        - atr_50sma_zone
        - rolling_20d_close_high
        - high
        pool_tracking:
        - low_since_detection
        - high_since_detection
      setup_maturity:
        indicators:
          pullback_depth_rr_quality:
            weight: 0.35
          volume_dry_up:
            weight: 0.25
            field: volume_ma5_to_ma20_ratio
            breakpoints:
            - [0.60, 100]
            - [0.70, 80]
            - [0.80, 55]
            - [0.85, 35]
            - [0.95, 10]
            - [1.00, 0]
          rs_resilience:
            weight: 0.20
            field: rs21
            breakpoints:
            - [40, 0]
            - [50, 25]
            - [60, 55]
            - [70, 80]
            - [80, 100]
          trend_health:
            weight: 0.20
            field: sma50_slope_10d_pct
            breakpoints:
            - [-0.05, 0]
            - [0.00, 25]
            - [0.05, 55]
            - [0.10, 80]
            - [0.20, 100]
      timing:
        indicators:
          pattern_trigger:
            weight: 0.30
          ma_reclaim_event:
            weight: 0.25
          volume_confirmation:
            weight: 0.25
            field: rel_volume
            breakpoints:
            - [0.80, 10]
            - [1.00, 35]
            - [1.30, 65]
            - [1.50, 85]
            - [2.00, 100]
          demand_footprint:
            weight: 0.20
      risk_reward:
        stop:
          reference: depth_adaptive
          atr_buffer: 0.50
          min_distance_atr: 0.50
          structural_penalty: 0.85
        reward:
          primary: snapshot_rolling_20d_close_high
          secondary: high_52w
          fallback: measured_move
        scoring:
          method: system_default
          breakpoints:
          - [0.5, 5]
          - [1.0, 25]
          - [1.5, 50]
          - [2.0, 70]
          - [2.5, 85]
          - [3.0, 95]
      entry_strength:
        weights:
          setup_maturity: 0.35
          timing: 0.40
          risk_reward: 0.25
        floor_gate:
          min_axis_threshold: 15
          capped_strength: 30
      display:
        thresholds:
          signal_detected: 48
          approaching: 32
          tracking: 0
    momentum_acceleration_entry:
      display_name: "Momentum Acceleration Entry"
      signal_version: "1.0"
      description: >
        Scores established momentum candidates when a fresh acceleration event appears,
        with R/R-aware stop placement and climax-top guards.
      pool:
        preset_sources:
        - "Momentum Ignition"
        detection_window_days: 3
        invalidation:
        - field: daily_change_pct
          condition: below
          threshold: -4.0
        - field: close
          condition: below
          reference: sma50
        - field: weekly_return_rank
          condition: below
          threshold: 80.0
        snapshot_fields:
        - close
        - high
        - low
        - atr
        - rs21
        - vcs
        - weekly_return_rank
        - rel_volume
        - daily_change_pct
        - dcr_percent
        - dist_from_52w_high
        - pp_count_window
        pool_tracking:
        - low_since_detection
        - high_since_detection
      setup_maturity:
        indicators:
          vcs_quality:
            weight: 0.40
            field: vcs
            breakpoints:
            - [35, 10]
            - [45, 30]
            - [55, 55]
            - [65, 80]
            - [75, 100]
          pp_density:
            weight: 0.30
            field: pp_count_window
            breakpoints:
            - [0, 10]
            - [1, 35]
            - [2, 70]
            - [3, 100]
          momentum_rank:
            weight: 0.30
            field: weekly_return_rank
            breakpoints:
            - [80, 20]
            - [90, 55]
            - [97, 100]
      timing:
        indicators:
          acceleration_event:
            weight: 0.35
          volume_confirmation:
            weight: 0.30
            field: rel_volume
            breakpoints:
            - [0.80, 10]
            - [1.00, 40]
            - [1.50, 75]
            - [2.00, 100]
            - [3.00, 90]
            - [5.00, 65]
          close_quality:
            weight: 0.20
            field: dcr_percent
            breakpoints:
            - [30, 5]
            - [40, 15]
            - [50, 35]
            - [60, 60]
            - [70, 80]
            - [80, 100]
          follow_through:
            weight: 0.15
      risk_reward:
        stop:
          reference: acceleration_day_low
          atr_buffer: 0.25
          min_distance_atr: 0.25
          structural_penalty: 0.80
        reward:
          primary: rr_2x
          secondary: momentum_8pct
          fallback: measured_move
        scoring:
          method: system_default
          breakpoints:
          - [0.5, 5]
          - [1.0, 25]
          - [1.5, 50]
          - [2.0, 70]
          - [2.5, 85]
          - [3.0, 95]
      entry_strength:
        weights:
          setup_maturity: 0.20
          timing: 0.45
          risk_reward: 0.35
        floor_gate:
          min_axis_threshold: 20
          capped_strength: 30
      display:
        thresholds:
          signal_detected: 55
          approaching: 40
          tracking: 0
