    enabled: false
    output_dir: data_runs/service_outputs/preset_exports
    write_details: true
    top_ticker_limit: 5
  watchlist_presets:
  - preset_name: Reclaim Trigger
    selected_scan_names: [Reclaim scan, Pocket Pivot]
    selected_annotation_filters: [Stage 2 Quality Score, Mature / Late Stage Risk Filter]
    selected_duplicate_subfilters: []
    duplicate_threshold: 1
    duplicate_rule:
      mode: required_plus_optional_min
      required_scans: [Reclaim scan]
      optional_scans: [Pocket Pivot]
      optional_min_hits: 1
    preset_status: enabled
  - preset_name: Fresh Stage 2 Breakout
    selected_scan_names: [Fresh Stage 2 Breakout, RS Leads Price Setup, VCS 52 High, Pocket Pivot, Volume Accumulation]
    selected_annotation_filters: [Stage 2 Quality Score, Mature / Late Stage Risk Filter]
    selected_duplicate_subfilters: []
    duplicate_threshold: 1
    duplicate_rule:
      mode: grouped_threshold
      required_scans: [Fresh Stage 2 Breakout]
      optional_groups:
      - group_name: Leadership Confirmation
        scans: [RS Leads Price Setup, VCS 52 High]
        min_hits: 1
      - group_name: Demand Confirmation
        scans: [Pocket Pivot, Volume Accumulation]
        min_hits: 1
    preset_status: enabled
  - preset_name: Accumulation Breakout
    selected_scan_names: [VCS 52 High, PP Count, Volume Accumulation, Pocket Pivot, 4% bullish, VCP 3T]
    selected_annotation_filters: [Stage 2 Quality Score, Mature / Late Stage Risk Filter]
    selected_duplicate_subfilters: []
    duplicate_threshold: 1
    duplicate_rule:
      mode: grouped_threshold
      required_scans: [VCS 52 High]
      optional_groups:
      - group_name: Accumulation Evidence
        scans: [PP Count, Volume Accumulation]
        min_hits: 1
      - group_name: Breakout Trigger
        scans: [Pocket Pivot, 4% bullish, VCP 3T]
        min_hits: 1
    preset_status: enabled
  - preset_name: VCP 3T Breakout
    selected_scan_names: [VCP 3T, VCS 52 High, Pocket Pivot, Volume Accumulation, RS New High, RS 3Y New High, RS Leads Price Setup]
    selected_annotation_filters: [Stage 2 Quality Score, Mature / Late Stage Risk Filter]
